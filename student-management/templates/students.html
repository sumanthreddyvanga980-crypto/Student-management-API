{% extends 'base.html' %}

{% block content %}

<h1>Student Management System</h1>

<form action="/add_student" method="POST">

    <input type="text"
           name="name"
           placeholder="Enter Name"
           required>

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required>

    <input type="text"
           name="course"
           placeholder="Enter Course"
           required>

    <button type="submit">
        Add Student
    </button>

</form>

<table>

    <tr>

        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Course</th>

    </tr>

    {% for student in students %}

    <tr>

        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.course }}</td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
